<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f6f7">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Budget">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Budget Alex — Suivi personnel</title>
<style>
  :root{
    --bg:#f4f6f7;
    --bg-elev:#ffffff;
    --panel:#ffffff;
    --panel-2:#eef2f4;
    --line:#dde3e7;
    --teal:#2f8f85;
    --teal-soft:#d9efec;
    --teal-bright:#1f6f66;
    --ink:#182028;
    --muted:#63727b;
    --muted-2:#8b98a1;
    --pos:#1f9d63;
    --neg:#c8503d;
    --warn:#a8790a;
    --radius:10px;
    --serif: "Iowan Old Style","Palatino Linotype",Georgia,"Times New Roman",serif;
    --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono: ui-monospace,"SF Mono",Consolas,monospace;
    --header-h: 0px;
  }
  body.dark{
    --bg:#0a1420;
    --bg-elev:#101c2c;
    --panel:#132234;
    --panel-2:#0d1b29;
    --line:#1e3348;
    --teal:#4fb3a9;
    --teal-soft:#2a5a56;
    --teal-bright:#7fd9cd;
    --ink:#e8eef3;
    --muted:#7f92a3;
    --muted-2:#5a6c7c;
    --pos:#5fbf8f;
    --neg:#e0836f;
    --warn:#d9b45f;
  }
  body{transition:background .2s, color .2s;}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);}
  body{-webkit-font-smoothing:antialiased;padding-bottom:70px;}
  ::selection{background:var(--teal-soft);}
  a{color:var(--teal-bright);}

  /* ---------- header ---------- */
  header.top{
    position:sticky;top:0;z-index:20;
    background:var(--bg-elev);
    border-bottom:1px solid var(--line);
    padding:14px 18px 10px;
  }
  .top-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .brand{font-family:var(--serif);font-size:20px;letter-spacing:0.3px;color:var(--ink);}
  .brand em{color:var(--teal-bright);font-style:normal;}
  .month-nav{display:flex;align-items:center;gap:8px;}
  .month-nav button{
    background:var(--panel);border:1px solid var(--line);color:var(--ink);
    width:30px;height:30px;border-radius:8px;font-size:15px;cursor:pointer;
  }
  .month-nav button:hover{border-color:var(--teal);}
  .month-label{font-family:var(--serif);font-size:16px;min-width:150px;text-align:center;text-transform:capitalize;}
  select.month-select{
    background:var(--panel);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:5px 8px;font-family:var(--sans);font-size:13px;
  }

  /* ---------- tab bar (bottom nav on mobile, top on desktop) ---------- */
  nav.tabs{
    display:flex;gap:2px;margin-top:12px;border-bottom:1px solid var(--line);
    overflow-x:auto;scrollbar-width:none;
  }
  nav.tabs::-webkit-scrollbar{display:none;}
  nav.tabs button{
    background:none;border:none;color:var(--muted);padding:9px 14px;font-size:13.5px;
    cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-family:var(--sans);
    font-weight:500;
  }
  nav.tabs button.active{color:var(--teal-bright);border-bottom-color:var(--teal);}

  main{padding:16px 18px 40px;max-width:1100px;margin:0 auto;}
  @media (max-width:420px){
    main{padding:12px 10px 40px;}
    header.top{padding:12px 10px 8px;}
  }
  .view{display:none;}
  .view.active{display:block;animation:fadein .18s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:none;}}

  /* ---------- cards / grid ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px;}
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:13px 14px;position:relative;overflow:hidden;
  }
  .card .eyebrow{font-size:10.5px;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted-2);margin-bottom:6px;}
  .card .value{font-family:var(--serif);font-size:22px;color:var(--ink);}
  .card .value.pos{color:var(--pos);}
  .card .value.neg{color:var(--neg);}
  .card .sub{font-size:11.5px;color:var(--muted);margin-top:4px;}
  .card.accent{border-color:var(--teal-soft);background:linear-gradient(160deg,var(--panel) 55%, var(--teal-soft) 220%);}

  .section-title{
    font-family:var(--serif);font-size:16px;color:var(--ink);margin:22px 0 10px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .section-title .hint{font-size:11px;color:var(--muted-2);font-family:var(--sans);font-weight:400;}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;}

  /* ---------- table ---------- */
  table.tx{width:100%;border-collapse:collapse;font-size:13px;}
  table.tx th{
    text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:0.6px;
    color:var(--muted-2);font-weight:600;padding:6px 8px;border-bottom:1px solid var(--line);
  }
  table.tx td{padding:8px 8px;border-bottom:1px solid var(--panel-2);vertical-align:middle;}
  table.tx tr:hover td{background:rgba(79,179,169,0.045);}
  .amt{font-family:var(--mono);text-align:right;white-space:nowrap;}
  .amt.pos{color:var(--pos);}
  .amt.neg{color:var(--neg);}
  .tag{
    display:inline-block;font-size:10.5px;padding:2px 7px;border-radius:20px;
    background:rgba(127,146,163,0.13);color:var(--muted);white-space:nowrap;
  }
  .chk{
    width:18px;height:18px;border-radius:5px;border:1.5px solid var(--muted-2);
    display:inline-flex;align-items:center;justify-content:center;cursor:pointer;
    background:transparent;
  }
  .chk.done{background:var(--teal-soft);border-color:var(--teal);color:var(--teal-bright);}
  .row-actions{display:flex;gap:6px;}
  .icon-btn{
    background:none;border:none;color:var(--muted-2);cursor:pointer;font-size:14px;padding:2px 5px;
  }
  .icon-btn:hover{color:var(--teal-bright);}

  /* Variante inline de la flèche bas, insérée dans la barre de filtres — seulement utilisée sur petit écran (voir media query plus bas) */
  .scroll-jump-inline{display:none;}

  /* ---------- responsive: compact rows on narrow screens (iPhone etc.) ---------- */
  @media (max-width:640px){
    table.tx thead{display:none;}
    table.tx, table.tx tbody{display:block;width:100%;}
    table.tx tr{
      display:flex;flex-wrap:wrap;align-items:center;gap:0 7px;
      border:1px solid var(--line);border-radius:9px;margin-bottom:5px;padding:7px 10px;
      background:var(--panel);
    }
    table.tx td{display:block;border-bottom:none;padding:0;}
    table.tx td:nth-child(1){order:1;}                             /* case à cocher */
    table.tx td:nth-child(2){                                      /* libellé */
      order:2;flex:1;min-width:0;font-size:13.5px;font-weight:500;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    table.tx td:nth-child(5){order:3;font-size:14px;}              /* montant */
    table.tx td:nth-child(6){order:4;}                             /* crayon */
    table.tx tr::after{content:'';width:100%;order:5;}             /* saut de ligne */
    table.tx td:nth-child(3){order:6;margin-left:auto;margin-top:3px;} /* catégorie, à droite */
    table.tx td:nth-child(4){order:7;margin-top:3px;}              /* compte */
    table.tx td:nth-child(3) .tag, table.tx td:nth-child(4) .tag{font-size:9.5px;padding:1px 6px;}

    /* Sur petit écran, la flèche bas flottante gêne le tableau : on la remplace par une version
       inline à gauche du champ de recherche (voir .scroll-jump-inline dans la filter-bar). */
    #scrollDownBtn{display:none;}
    .scroll-jump-inline{
      display:flex;align-items:center;justify-content:center;flex:0 0 auto;
      width:22px;height:22px;border:none;background:none;padding:0;cursor:pointer;
      font-size:19px;line-height:1;color:var(--teal-bright);
      opacity:0;pointer-events:none;transition:opacity .2s ease;
    }
    .scroll-jump-inline.show{opacity:0.8;pointer-events:auto;}
    .scroll-jump-inline:hover{opacity:1;}
  }

  .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
  .filter-bar input, .filter-bar select{
    background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    border-radius:7px;padding:6px 9px;font-size:12.5px;font-family:var(--sans);
  }
  .filter-bar input[type=text]{flex:1;min-width:120px;}

  .btn{
    background:var(--teal-soft);color:var(--teal-bright);border:1px solid var(--teal);
    border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:var(--sans);
    font-weight:500;
  }
  .btn:hover{background:var(--teal);color:#06231f;}
  .btn.ghost{background:none;color:var(--muted);border-color:var(--line);}
  .btn.ghost:hover{color:var(--ink);border-color:var(--muted-2);}
  .btn.small{padding:5px 10px;font-size:12px;}
  .fab{
    position:fixed;bottom:20px;right:20px;z-index:30;
    width:52px;height:52px;border-radius:50%;background:var(--teal);color:#06231f;
    border:none;font-size:26px;cursor:pointer;box-shadow:0 6px 20px rgba(79,179,169,0.35);
    display:flex;align-items:center;justify-content:center;
  }

  /* Boutons de saut haut/bas du tableau : juste la flèche, pas de cadre, un seul visible à la fois */
  .scroll-jump{
    position:fixed;left:20px;bottom:26px;z-index:29;
    width:40px;height:40px;border:none;background:none;padding:0;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;line-height:1;color:var(--teal-bright);
    filter:drop-shadow(0 1px 4px rgba(0,0,0,0.35));
    opacity:0;transform:translateY(6px);pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
  }
  .scroll-jump.show{opacity:0.8;transform:none;pointer-events:auto;}
  .scroll-jump:hover{opacity:1;}

  /* ---------- modal ---------- */
  .modal-bg{
    position:fixed;inset:0;background:rgba(4,9,15,0.6);backdrop-filter:blur(2px);
    display:none;align-items:flex-end;justify-content:center;z-index:50;
  }
  .modal-bg.show{display:flex;}
  .modal{
    background:var(--bg-elev);border:1px solid var(--line);border-radius:16px 16px 0 0;
    width:100%;max-width:480px;padding:20px;max-height:88vh;overflow-y:auto;
  }
  @media (min-width:600px){
    .modal-bg{align-items:center;}
    .modal{border-radius:14px;}
  }
  .modal h3{font-family:var(--serif);margin:0 0 14px;font-size:18px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px;}
  .field input, .field select{
    /* 16px minimum : en dessous, Safari iOS zoome automatiquement sur le champ au focus
       et ne revient pas toujours à l'échelle normale ensuite. */
    width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:9px 10px;font-size:16px;font-family:var(--sans);
  }
  .field input:focus, .field select:focus{outline:none;border-color:var(--teal);}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

  canvas{max-width:100%;}
  .empty{color:var(--muted-2);font-size:13px;padding:20px 0;text-align:center;}
  .legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:10px;font-size:13px;color:var(--ink);}
  .legend .dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle;}

  .toast{
    position:fixed;bottom:85px;left:50%;transform:translateX(-50%);
    background:var(--teal);color:#06231f;padding:9px 16px;border-radius:8px;font-size:13px;
    z-index:60;opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;
    font-weight:500;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);pointer-events:auto;}
  .toast-action{color:inherit;text-decoration:underline;font-weight:700;margin-left:8px;cursor:pointer;white-space:nowrap;}

  footer.data-tools{
    max-width:1100px;margin:0 auto;padding:8px 18px 30px;display:flex;gap:8px;flex-wrap:wrap;
    justify-content:center;
  }
  footer.data-tools .note{width:100%;text-align:center;font-size:11px;color:var(--muted-2);margin-top:6px;}

  .sync-row{margin-top:8px;}
  .sync-btn{
    background:none;border:1px solid var(--line);color:var(--muted);
    border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;font-family:var(--sans);
  }
  .sync-btn:hover{border-color:var(--teal);color:var(--ink);}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted-2);display:inline-block;}
  .sync-dot.ok{background:var(--pos);}
  .sync-dot.syncing{background:var(--warn);animation:pulse 1s infinite;}
  .sync-dot.error{background:var(--neg);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  .theme-toggle{
    background:none;border:none;cursor:pointer;font-size:13px;opacity:0.5;
    padding:2px 4px;vertical-align:middle;margin-left:2px;
  }
  .theme-toggle:hover{opacity:1;}

  /* Barre de KPI compacte et collante au-dessus du tableau de suivi */
  .kpi-bar{
    position:sticky;top:var(--header-h);z-index:15;
    display:grid;grid-template-columns:repeat(3,1fr);gap:6px;
    background:var(--bg);padding:8px 0 9px;margin-bottom:8px;
    border-bottom:1px solid var(--line);
  }
  .kpi{
    background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:6px 8px;text-align:center;
  }
  .kpi .k-label{font-size:9px;text-transform:uppercase;letter-spacing:0.4px;color:var(--muted-2);white-space:nowrap;}
  .kpi .k-value{font-family:var(--serif);font-size:15px;margin-top:1px;line-height:1.1;}
  .kpi .k-value.pos{color:var(--pos);}
  .kpi .k-value.neg{color:var(--neg);}
  @media (max-width:420px){
    .kpi{padding:5px 4px;}
    .kpi .k-value{font-size:13.5px;}
    .kpi .k-label{font-size:8.5px;letter-spacing:0.2px;}
  }
</style>
</head>
<body>

<header class="top">
  <div class="top-row">
    <div class="brand">Budget <em>Alex</em> <button id="themeToggle" class="theme-toggle" title="Basculer en mode sombre">🌙</button></div>
    <div class="month-nav">
      <button id="prevMonth">‹</button>
      <div class="month-label" id="monthLabel">—</div>
      <button id="nextMonth">›</button>
      <select class="month-select" id="monthJump"></select>
    </div>
  </div>
  <div class="sync-row" id="syncRow">
    <button class="sync-btn" id="btnSync">
      <span id="syncDot" class="sync-dot"></span>
      <span id="syncLabel">Se connecter à OneDrive</span>
    </button>
  </div>
  <nav class="tabs">
    <button data-view="transactions" class="active">Suivi du mois</button>
    <button data-view="dashboard">Tableau de bord</button>
    <button data-view="analyses">Analyses</button>
    <button data-view="epargne">Épargne</button>
  </nav>
</header>

<main>

  <!-- DASHBOARD -->
  <section class="view" id="view-dashboard"></section>

  <!-- TRANSACTIONS -->
  <section class="view active" id="view-transactions"></section>

  <!-- ANALYSES -->
  <section class="view" id="view-analyses"></section>

  <!-- EPARGNE -->
  <section class="view" id="view-epargne"></section>

</main>

<button class="fab" id="fabAdd" title="Ajouter une dépense/recette">+</button>
<button class="scroll-jump" id="scrollDownBtn" title="Aller en bas du tableau" aria-label="Aller en bas du tableau">↓</button>
<button class="scroll-jump" id="scrollUpBtn" title="Aller en haut du tableau" aria-label="Aller en haut du tableau">↑</button>

<div class="modal-bg" id="itemModalBg">
  <div class="modal">
    <h3 id="itemModalTitle">Nouvelle ligne</h3>
    <div class="field">
      <label>Libellé</label>
      <input type="text" id="f_item" placeholder="Ex : Courses, Netflix, Essence…">
    </div>
    <div class="field">
      <label>Mois de facturation</label>
      <select id="f_month"></select>
    </div>
    <div class="two-col">
      <div class="field">
        <label>Montant (€)</label>
        <input type="number" step="0.01" id="f_montant" placeholder="0.00">
      </div>
      <div class="field">
        <label>Type</label>
        <select id="f_sens">
          <option value="depense">Dépense</option>
          <option value="recette">Recette</option>
        </select>
      </div>
    </div>
    <div class="two-col">
      <div class="field">
        <label>Catégorie</label>
        <select id="f_categorie_type"></select>
      </div>
      <div class="field">
        <label>Compte / moyen de paiement</label>
        <select id="f_categorie"></select>
      </div>
    </div>
    <div class="field">
      <label>Date</label>
      <div style="display:flex;align-items:center;gap:10px;">
        <input type="date" id="f_echeance" style="flex:1;">
        <label style="display:flex;align-items:center;gap:6px;text-transform:none;letter-spacing:0;font-size:12.5px;color:var(--muted);white-space:nowrap;">
          <input type="checkbox" id="f_echeance_confirm" style="width:auto;"> Valider
        </label>
      </div>
    </div>
    <div class="field">
      <label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;">
        <input type="checkbox" id="f_traite" style="width:auto;"> Déjà traité (débité/crédité sur le compte)
      </label>
    </div>
    <div class="field">
      <label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;">
        <input type="checkbox" id="f_recurrent" style="width:auto;"> Récurrent chaque mois (repris automatiquement à la création du mois suivant)
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="btnDeleteItem" style="display:none;margin-right:auto;">Supprimer</button>
      <button class="btn ghost" id="btnCancelItem">Annuler</button>
      <button class="btn" id="btnSaveItem">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer class="data-tools">
  <button class="btn ghost small" id="btnExport">Exporter mes données (JSON)</button>
  <button class="btn ghost small" id="btnImport">Importer une sauvegarde</button>
  <input type="file" id="fileImport" accept=".json" style="display:none;">
  <div class="note">Les données sont enregistrées automatiquement dans ce navigateur (localStorage). Exportez régulièrement une sauvegarde.</div>
</footer>

<script>__MSAL_JS__</script>
<script id="seed-data" type="application/json">__SEED_DATA__</script>
<script>__APP_JS__</script>
</body>
</html>
